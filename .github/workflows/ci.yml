name: ci

on:
  push:
  pull_request:

jobs:
  node:
    name: node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 20 = baseline (engines: ">=20"); 24 = has node:sqlite for @yaebal/panel's store
        node: [20, 24]
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm test

      - run: pnpm lint

  bun:
    name: bun (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - uses: oven-sh/setup-bun@v2

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      # bun can execute node:test files through its test runner — run compiled test suites as a smoke lane
      - run: bun test packages/core/lib/core.test.js
      - run: bun test packages/core/lib/filter.test.js

  deno:
    name: deno (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      # deno smoke: type-check the compiled core entry point. --node-modules-dir=manual
      # (byonm) resolves bare specifiers through the pnpm-installed node_modules like node
      # does — the bare flag (= auto) makes deno manage node_modules itself, and it can't
      # map the `workspace:*` dependency on @yaebal/types (runtime import since format-hook).
      - run: deno check --node-modules-dir=manual packages/core/lib/index.js
