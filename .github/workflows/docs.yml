name: docs

on:
  pull_request:
  push:

jobs:
  docs:
    name: health check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # typecheck (tsc --noEmit) does not build project references, and workspace packages
      # resolve each other through lib/*.d.ts — so build first on a fresh checkout, or any
      # package importing @yaebal/types (keyboard, runner, …) fails with TS2307.
      - run: pnpm build

      - run: pnpm docs:check

      - run: pnpm typecheck
