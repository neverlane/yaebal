name: release

on:
  # run only after the CI workflow finishes successfully on master
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write # create git tags + github releases
  id-token: write # npm provenance

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: publish all packages
    # gate on a green CI run (workflow_run) or an explicit manual trigger
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history so auto-release can build per-package changelogs
          # the exact commit CI validated (falls back to the branch on manual dispatch)
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: setup pnpm
        uses: pnpm/action-setup@v6

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: install
        run: pnpm install --frozen-lockfile

      # CI already ran typecheck/test/lint on this commit, so skip the gate and just
      # build → publish to npm → cut a github release per package. publish is idempotent:
      # a version already on npm is skipped, so a run with no version bump is a no-op.
      - name: release
        run: node scripts/release.mjs
        env:
          RELEASE_SKIP_GATE: "1"
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
