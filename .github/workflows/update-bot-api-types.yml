name: update bot api types

# checks core.telegram.org/bots/api once a day for a newer Bot API version (Telegram ships
# roughly monthly — daily is frequent enough to catch a release within 24h without burning
# CI minutes on an hourly poll). when the live docs are ahead of packages/types/schema.json,
# regenerates @yaebal/types + @yaebal/contexts + the apps/docs Bot API reference
# (apps/docs/src/lib/api/data.generated.ts + the per-method/type route pages) and opens a
# PR — nothing lands on master without going through the normal ci.yml gate + a review.
on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - id: update
        run: node packages/types/scripts/update-schema.mjs

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # schema.json (regenerated above, via the same parser) now carries the doc's <h3>
      # category per method/object, so the docs generator needs nothing beyond that file —
      # no separate scrape.
      - if: steps.diff.outputs.changed == 'true'
        run: node apps/docs/scripts/generate-api-reference.mjs

      # gate the PR on the same checks ci.yml runs, so a parser edge case never lands as a PR
      # that looks green just because nothing verified it
      - if: steps.diff.outputs.changed == 'true'
        run: pnpm build

      - if: steps.diff.outputs.changed == 'true'
        run: pnpm test

      - if: steps.diff.outputs.changed == 'true'
        run: pnpm typecheck

      - if: steps.diff.outputs.changed == 'true'
        run: pnpm lint

      # apps/docs isn't part of the pnpm build/test/typecheck/lint above (those are scoped to
      # packages/*) — check and build it separately so a schema shape the generator doesn't
      # expect fails the workflow instead of landing as a broken reference page.
      - if: steps.diff.outputs.changed == 'true'
        run: pnpm --filter @yaebal/docs check

      - if: steps.diff.outputs.changed == 'true'
        run: pnpm --filter @yaebal/docs build

      - if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.update.outputs.version }}
        run: |
          branch="bot-api-update/v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add packages/types packages/contexts apps/docs/src/lib/api apps/docs/src/routes/docs/api
          git commit -m "feat(types): update to bot api v${VERSION}"
          git push origin "$branch" --force

          if gh pr view "$branch" --json state --jq .state 2>/dev/null | grep -q OPEN; then
            echo "PR for $branch already open — updated it"
          else
            gh pr create \
              --title "feat(types): update to bot api v${VERSION}" \
              --body "auto-generated by [update-bot-api-types.yml](../actions/workflows/update-bot-api-types.yml) — regenerates \`@yaebal/types\`, \`@yaebal/contexts\`, and the [Bot API reference](../tree/master/apps/docs/src/routes/docs/api) docs from the live [Bot API docs](https://core.telegram.org/bots/api). typecheck/build/test/lint (including the docs app) all passed before this PR was opened. merging will publish \`@yaebal/types@${VERSION}\` via the existing release pipeline." \
              --head "$branch"
          fi
